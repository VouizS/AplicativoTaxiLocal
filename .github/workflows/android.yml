name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Via Prime Demo APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Create temporary demo release key
        run: |
          keytool -genkeypair -v -keystore demo-release.jks -storepass viaprime_demo_010 -alias viaprime -keypass viaprime_demo_010 -keyalg RSA -keysize 2048 -validity 3650 -dname "CN=Via Prime Demo,O=SW,C=BR"

      - name: Build signed release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace -PDEMO_KEYSTORE=$PWD/demo-release.jks -PDEMO_STORE_PASSWORD=viaprime_demo_010 -PDEMO_KEY_ALIAS=viaprime -PDEMO_KEY_PASSWORD=viaprime_demo_010

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/ViaPrimeDemo-v0.1.0-release.apk
          sha256sum dist/ViaPrimeDemo-v0.1.0-release.apk > dist/ViaPrimeDemo-v0.1.0-release.sha256.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViaPrimeDemo-v0.1.0-release-apk
          path: dist/*
