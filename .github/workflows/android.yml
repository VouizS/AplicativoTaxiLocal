name: Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - name: Build debug APK
        run: gradle :app:assembleClienteDebug :app:assembleMotoristaDebug --stacktrace
      - name: Rename APK
        run: |
          mkdir -p out
          SHA_SHORT="${GITHUB_SHA::7}"
          SHA_SHORT="${SHA_SHORT:-${GITHUB_SHA::7}}"

          CLIENTE_APK="$(find app/build/outputs/apk -type f -iname "*cliente*debug*.apk" | head -n 1)"

          MOTORISTA_APK="$(find app/build/outputs/apk -type f \( -iname "*motorista*debug*.apk" -o -iname "*motoristas*debug*.apk" \) | head -n 1)"

          if [ -z "$CLIENTE_APK" ]; then CLIENTE_APK="$(find app/build/outputs/apk -type f -path "*/cliente/debug/*.apk" | head -n 1)"; fi

          if [ -z "$MOTORISTA_APK" ]; then MOTORISTA_APK="$(find app/build/outputs/apk -type f -path "*/motorista/debug/*.apk" | head -n 1)"; fi

          echo "APKs encontrados:"

          find app/build/outputs/apk -type f -name "*.apk" -print

          test -n "$CLIENTE_APK"

          test -n "$MOTORISTA_APK"

          cp "$CLIENTE_APK" "out/ViaPrimeCliente-v0.2.0-${SHA_SHORT}.apk"

          cp "$MOTORISTA_APK" "out/ViaPrimeMotoristas-v0.2.0-${SHA_SHORT}.apk"

          sha256sum out/*.apk > out/SHA256SUMS.txt
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ViaPrimeDemo-v0.1.3-apk
          path: out/*.apk
